services:
  - type: web
    name: railways-matcher-api
    env: node
    plan: free
    buildCommand: npm ci
    startCommand: node server/index.js
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATA_ROOT
        value: /opt/render/project/src/runtime_data
      - key: RAW_TRAINS_FILE
        value: /opt/render/project/src/runtime_data/trains.json
      - key: RAW_STATIONS_FILE
        value: /opt/render/project/src/runtime_data/stations.json
      - key: RAW_SCHEDULES_FILE
        value: /opt/render/project/src/runtime_data/schedules.json
      - key: PREBUILT_ROUTES_FILE
        value: /opt/render/project/src/runtime_data/prebuilt_routes.json
      - key: RAW_TRAINS_URL
        value: https://raw.githubusercontent.com/datameet/railways/master/trains.json
      - key: RAW_STATIONS_URL
        value: https://raw.githubusercontent.com/datameet/railways/master/stations.json
      - key: RAW_SCHEDULES_URL
        value: https://raw.githubusercontent.com/datameet/railways/master/schedules.json
      - key: FRONTEND_ORIGIN
        sync: false
      - key: MCP_AUTH_TOKEN
        sync: false
